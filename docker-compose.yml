services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    command: bash -c "bundle install && bundle exec rails db:prepare && rm -f tmp/pids/server.pid && bundle exec rails server -b 0.0.0.0"
    user: "${MY_UID}:${GID}"
    volumes:
      - .:/rails
    ports:
      - "3000:3000"
    depends_on:
      - db
    environment:
      DATABASE_URL: ${DATABASE_URL}
      RAILS_ENV: ${RAILS_ENV}
      BUNDLE_PATH: /rails/vendor/bundle
  css:
    build: .
    command: bash -c "bundle install && bundle exec rails tailwindcss:watch[always]"
    working_dir: /rails
    user: "${MY_UID}:${GID}"
    volumes:
      - .:/rails
    depends_on:
      - app
    environment:
      RAILS_ENV: ${RAILS_ENV}
      BUNDLE_PATH: /rails/vendor/bundle
volumes:
  postgres_data:
